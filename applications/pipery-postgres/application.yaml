apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipery-postgres
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/pipery-dev/argocd.git
    targetRevision: main
    path: applications/pipery-postgres/manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: pipery
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
