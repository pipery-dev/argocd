apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pipery-release-bot
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://github.com/pipery-dev/pipery-release-bot.git
      targetRevision: main
      path: charts/pipery-release-bot
      helm:
        valueFiles:
          - values.yaml
          - $values/applications/pipery-release-bot/values.yaml
    - repoURL: https://github.com/pipery-dev/argocd.git
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: pipery
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
